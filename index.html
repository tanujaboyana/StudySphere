<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollabSync AI | Initialize</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #8a2be2;
            /* purple */
            --teal: #00f2ff;
            /* cyan */
            --dark-bg: #050505;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            cursor: crosshair;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .intro-container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* ===== Logo & Pulse ===== */

        .logo-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 2px solid var(--teal);
            opacity: 0;
            animation: ripple 2.5s ease-out infinite;
        }

        .pulse-ring.delay {
            animation-delay: 1.2s;
        }

        @keyframes ripple {
            0% {
                transform: scale(0.6);
                opacity: 0.6;
            }

            70% {
                transform: scale(1.4);
                opacity: 0;
            }

            100% {
                opacity: 0;
            }
        }

        .logo-core {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--teal), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: black;
            letter-spacing: 2px;
            box-shadow:
                0 0 25px rgba(0, 242, 255, 0.7),
                inset 0 0 20px rgba(255, 255, 255, 0.2);

            transform: scale(0);
            animation: popIn 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0) rotate(-90deg);
                opacity: 0;
            }

            70% {
                transform: scale(1.1) rotate(5deg);
            }

            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        /* ===== Gradient Title ===== */

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            margin: 0;
            opacity: 0;
            animation: title-fade 1.5s ease-out 0.5s forwards;

            background: linear-gradient(135deg, var(--accent), var(--teal));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes title-fade {
            to {
                opacity: 1;
                letter-spacing: 0.1em;
            }
        }

        .cyan-text {
            background: var(--teal);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .prompt {
            margin-top: 3rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: var(--teal);
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== Scanlines ===== */

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.03),
                    rgba(0, 255, 0, 0.01),
                    rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 20;
        }
        @media (max-width: 768px) {
    h1 {
        font-size: 2.8rem;
        letter-spacing: 0.15em;
    }

    .logo-core {
        width: 70px;
        height: 70px;
        font-size: 1.8rem;
    }

    .logo-container {
        width: 110px;
        height: 110px;
        margin-bottom: 1.5rem;
    }

    .pulse-ring {
        width: 110px;
        height: 110px;
    }

    .prompt {
        font-size: 0.65rem;
        letter-spacing: 0.25em;
        margin-top: 2rem;
        padding: 0 20px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 2rem;
        letter-spacing: 0.1em;
    }

    .logo-core {
        width: 60px;
        height: 60px;
        font-size: 1.5rem;
    }

    .logo-container {
        width: 90px;
        height: 90px;
    }

    .pulse-ring {
        width: 90px;
        height: 90px;
    }

    .prompt {
        font-size: 0.55rem;
        letter-spacing: 0.2em;
    }
}
    </style>
    <script>
    (function() {
        var s = localStorage.getItem('ss-theme') || 'dark';
        var D = {'--bg':'#07070d','--surface':'#0e0e18','--card':'#13131f','--border':'#1c1c2e','--text':'#e2e8f0','--muted':'#64748b','--dim':'#1e293b','--glow':'#8b5cf6','--teal-glow':'#22d3ee','--green-glow':'#10b981','--orange-glow':'#f59e0b','--accent':'#6d28d9'};
        var L = {'--bg':'#f4f5fa','--surface':'#ffffff','--card':'#ffffff','--border':'#e2e8f0','--text':'#0f172a','--muted':'#64748b','--dim':'#e2e8f0','--glow':'#7c3aed','--teal-glow':'#0ea5e9','--green-glow':'#10b981','--orange-glow':'#f59e0b','--accent':'#6d28d9'};
        var v = s === 'light' ? L : D;
        var r = document.documentElement;
        Object.keys(v).forEach(function(k){ r.style.setProperty(k, v[k]); });
        r.style.background = v['--bg'];
        r.style.color = v['--text'];
    })();
    </script>
</head>

<body onclick="navigateToNextPage()">

    <canvas id="canvas"></canvas>
    <div class="scanlines"></div>

    <div class="intro-container">
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <div class="pulse-ring delay"></div>
            <div class="logo-core">CS</div>
        </div>
        <h1>StudySphere<span class="cyan-text"></span></h1>
        <div class="prompt">CLICK TO INITIALIZE SYSTEM</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 150 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: Math.random() * 0.5 - 0.25,
                    speedY: Math.random() * 0.5 - 0.25,
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x > canvas.width || p.x < 0) p.speedX *= -1;
                if (p.y > canvas.height || p.y < 0) p.speedY *= -1;

                let dx = mouse.x - p.x;
                let dy = mouse.y - p.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < mouse.radius) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(0, 242, 255, ${1 - distance / mouse.radius})`;
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(mouse.x, mouse.y);
                    ctx.stroke();
                }

                ctx.fillStyle = '#00f2ff';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

       window.addEventListener('mousemove', (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
});

window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: false });

window.addEventListener('touchend', () => {
    mouse.x = null;
    mouse.y = null;
});

        function navigateToNextPage() {
            document.body.style.transition = "opacity 5.0s ease";
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = 'main.html';
            }, 500);
        }

        init();
        animate();
        window.onresize = init;
    </script>
</body>

</html>
