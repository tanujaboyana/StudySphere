<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        #profile-wrapper {
            position: fixed;
            top: 12px;
            right: 30px;
            z-index: 99999;
        }
        #profile-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 8px;
        }
        #profile-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4d94ff, #80b3ff);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: white;
            font-size: 16px;
        }
        #profile-menu {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: #13131f;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 14px;
            min-width: 220px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            z-index: 99999;
            overflow: hidden;
        }
        .profile-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .profile-item:hover { background: rgba(109,40,217,0.2); }
        .menu-divider {
            height: 1px;
            background: rgba(255,255,255,0.07);
            margin: 2px 0;
        }
        #theme-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 18px;
        }
        #theme-row-label {
            color: white;
            font-size: 14px;
        }
        .theme-switch {
            display: flex;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 999px;
            padding: 3px;
            gap: 3px;
        }
        .theme-switch button {
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            font-family: inherit;
            background: transparent;
            color: rgba(255,255,255,0.4);
            transition: all 0.2s;
        }
        .theme-switch button.active {
            background: #6d28d9;
            color: white;
            box-shadow: 0 2px 10px rgba(109,40,217,0.5);
        }
    </style>
</head>
<body>
    <div id="profile-wrapper">
        <div id="profile-btn">
            <div id="profile-avatar">P</div>
        </div>
        <div id="profile-menu">
            <a href="profileedit.html" class="profile-item">✏️ Edit Profile</a>
            <a href="change-password.html" class="profile-item">🔑 Change Password</a>
            <div class="menu-divider"></div>
            <div id="theme-row">
                <span id="theme-row-label">🌙 Theme</span>
                <div class="theme-switch">
                    <button id="btn-dark"  onclick="event.stopPropagation(); window.applyTheme('dark')">Dark</button>
                    <button id="btn-light" onclick="event.stopPropagation(); window.applyTheme('light')">Light</button>
                </div>
            </div>
            <div class="menu-divider"></div>
            <a href="main.html" id="logout-btn" class="profile-item">🚪 Logout</a>
        </div>
    </div>
    <!-- JS handled by parent page fetch callback -->
</body>
</html>
