<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard</title>
    <link rel="stylesheet" href="stylesheet1.css">
    <style>
        #canvas,
        .scanlines {
            pointer-events: none;
            /* important: allows drawing on wb-canvas */
            position: fixed;
            /* ensure full-screen background */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* behind everything else */
        }
        @media (max-width: 768px) {
    .wb-toolbar {
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px;
    }

    .wb-tool-btn {
        padding: 6px 10px;
        font-size: 11px;
    }

    #wb-canvas {
        max-height: 400px;
    }

    #main-nav {
        padding: 0 12px;
    }

    .nav-links {
        display: none;
    }
}

@media (max-width: 480px) {
    .wb-toolbar {
        gap: 4px;
        padding: 8px;
    }

    .wb-tool-btn {
        padding: 5px 8px;
        font-size: 10px;
    }

    #wb-canvas {
        max-height: 300px;
    }

    #brushSize {
        width: 60px;
    }
}
/* ── Hamburger ── */
.ham {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    flex-shrink: 0;
    margin-left: auto;
}
.ham span {
    display: block;
    width: 20px;
    height: 2px;
    background: #e2e8f0;
    border-radius: 2px;
    transition: all 0.3s;
}
.ham.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.ham.open span:nth-child(2) { opacity: 0; }
.ham.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mob-drawer {
    display: none;
    position: fixed;
    top: 56px;
    left: 0; right: 0;
    background: rgba(7,7,13,0.98);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px;
    flex-direction: column;
    gap: 6px;
    z-index: 999;
    transform: translateY(-110%);
    transition: transform 0.3s ease;
}
.mob-drawer.open { transform: translateY(0); }
.mob-drawer .nav-link {
    display: block;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
}
.mob-drawer .nav-link.active,
.mob-drawer .nav-link:hover {
    color: #e2e8f0;
    background: rgba(255,255,255,0.05);
}

@media (max-width: 768px) {
    #main-nav { height: 56px; flex-wrap: nowrap; gap: 10px; }
    #main-nav .nav-links { display: none !important; }
    .ham { display: flex; }
    .mob-drawer { display: flex; }

    #profile-container { right: 58px !important; width: auto !important; }
    .content-wrapper { padding-top: 68px !important; }

    /* Toolbar: horizontal scroll on mobile */
    .wb-toolbar {
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        scrollbar-width: none !important;
        gap: 5px !important;
        padding: 10px !important;
        -webkit-overflow-scrolling: touch;
    }
    .wb-toolbar::-webkit-scrollbar { display: none; }

    /* Brush size input */
    #brushSize { width: 70px !important; }

    /* Canvas height */
    #wb-canvas { height: 45vh !important; }

    .heading-lg { font-size: clamp(1.5rem, 5vw, 2.2rem) !important; }
}

@media (max-width: 480px) {
    #wb-canvas { height: 38vh !important; }

    /* Page header: tighter */
    .wb-page .content > div:first-child { margin-bottom: 12px !important; }

    /* Tool buttons: smaller */
    .wb-tool-btn { padding: 5px 8px !important; font-size: 10px !important; }

    /* Color swatches: slightly smaller */
    .wb-color { width: 20px !important; height: 20px !important; }
}
    </style>
</head>

<body>
    <!-- Background -->
    <canvas id="canvas"></canvas>
    <div class="scanlines"></div>

    <!-- Navbar -->
    <nav id="main-nav">
        <!-- Logo should navigate to landing page -->
        <a href="landing.html" class="nav-logo">
            <div class="nav-logo-icon">🔗</div>
            StudySphere 
        </a>

        <div class="nav-links" id="navLinks">
            <a class="nav-link" href="landing.html">Intro</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="match.html">Match</a>
            <a class="nav-link" href="session.html">Session</a>
            <a class="nav-link" href="leaderboard.html">Leaderboard</a>
            <a class="nav-link active" href="whiteboard.html">Whiteboard</a>
            <a class="nav-link" href="resources.html">Resources</a>
             <a class="nav-link" href="pomodoro.html">Pomodoro</a>
            <a class="nav-link" href="onboard.html">Onboard</a>
        </div>

        <!-- CTA should also navigate normally 
        <a href="onboard.html" class="nav-cta">Get Started →</a>  -->
    <button class="ham" id="hamBtn" aria-label="Menu">
    <span></span><span></span><span></span>
</button>
    </nav>
<div class="mob-drawer" id="mobDrawer">
    <a class="nav-link" href="landing.html">Intro</a>
    <a class="nav-link" href="dashboard.html">Dashboard</a>
    <a class="nav-link" href="match.html">Match</a>
    <a class="nav-link" href="session.html">Session</a>
    <a class="nav-link" href="leaderboard.html">Leaderboard</a>
    <a class="nav-link active" href="whiteboard.html">Whiteboard</a>
    <a class="nav-link" href="resources.html">Resources</a>
    <a class="nav-link" href="pomodoro.html">Pomodoro</a>
    <a class="nav-link" href="onboard.html">Onboard</a>
</div>
    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <div id="page-whiteboard" class="page">
            <div class="wb-page">
                <div class="content">
                    <div style="margin-bottom:20px;">
                        <div class="section-tag">Collaborative Canvas</div>
                        <h1 class="heading-lg" style="margin-bottom:6px;">🖊️ Live <span
                                class="gradient-text">Whiteboard</span></h1>
                        <p style="color:var(--muted);font-size:14px;">Draw, annotate, and collaborate in real-time</p>
                    </div>

                    <div class="wb-toolbar">
                        <button class="wb-tool-btn active" id="tool-pen" onclick="setTool('pen',this)">✏️ Pen</button>
                        <button class="wb-tool-btn" id="tool-eraser" onclick="setTool('eraser',this)">⬜ Eraser</button>
                        <button class="wb-tool-btn" id="tool-line" onclick="setTool('line',this)">📏 Line</button>
                        <button class="wb-tool-btn" id="tool-rect" onclick="setTool('rect',this)">⬛ Rect</button>
                        <button class="wb-tool-btn" id="tool-circle" onclick="setTool('circle',this)">⭕ Circle</button>
                        <button class="wb-tool-btn" id="tool-text" onclick="setTool('text',this)">T Text</button>
                        <div style="width:1px;height:28px;background:var(--border);margin:0 4px;"></div>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <div class="wb-color selected" style="background:#8b5cf6;"
                                onclick="setColor('#8b5cf6',this)">
                            </div>
                            <div class="wb-color" style="background:#22d3ee;" onclick="setColor('#22d3ee',this)"></div>
                            <div class="wb-color" style="background:#10b981;" onclick="setColor('#10b981',this)"></div>
                            <div class="wb-color" style="background:#f59e0b;" onclick="setColor('#f59e0b',this)"></div>
                            <div class="wb-color" style="background:#ef4444;" onclick="setColor('#ef4444',this)"></div>
                            <div class="wb-color" style="background:#f8fafc;" onclick="setColor('#f8fafc',this)"></div>
                        </div>
                        <div style="width:1px;height:28px;background:var(--border);margin:0 4px;"></div>
                        <span style="font-size:12px;color:var(--muted);">Size:</span>
                        <input type="range" id="brushSize" min="1" max="30" value="3"
                            style="width:80px;accent-color:var(--glow);" oninput="brushSz=this.value">
                        <div style="width:1px;height:28px;background:var(--border);margin:0 4px;"></div>
                        <button class="wb-tool-btn" onclick="clearWB()" style="color:var(--red);">🗑️ Clear</button>
                        <button class="wb-tool-btn" onclick="saveWB()" style="color:var(--green-glow);">💾 Save
                            PNG</button>
                    </div>

                    <canvas id="wb-canvas" width="1200" height="600"
    style="background:#0b0b16;border-radius:14px;border:1px solid var(--border);cursor:crosshair;display:block;width:100%;height:50vh;touch-action:none;"></canvas>
                </div>
            </div>
        </div>
    </div>
      <div id="profile-container"
        style="position: fixed; top: 0px; right: 20px; width: 250px; height: auto; z-index:1000;">
        <script>
            fetch('profile.html')
                .then(response => response.text())
                .then(html => {
                    // Insert the HTML
                    document.getElementById('profile-container').innerHTML = html;

                    // Manually attach the logout listener
                    const logoutBtn = document.getElementById('logout-btn');
                    if (logoutBtn) {
                        logoutBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            alert('You have been logged out!');
                            window.location.href = 'main.html'; // Full page redirect
                        });
                    }
                    // Also attach profile toggle
                    const profileBtn = document.getElementById('profile-btn');
                    const profileMenu = document.getElementById('profile-menu');
                    if (profileBtn && profileMenu) {
                        profileBtn.addEventListener('click', () => {
                            profileMenu.style.display = profileMenu.style.display === 'block' ? 'none' : 'block';
                        });
                        document.addEventListener('click', (e) => {
                            if (!profileBtn.contains(e.target) && !profileMenu.contains(e.target)) {
                                profileMenu.style.display = 'none';
                            }
                        });
                    }

                });
        </script>
    </div>
    <script>
        let wbCtx, wbDrawing = false, wbTool = 'pen', wbColor = '#8b5cf6', brushSz = 3;
        let startX, startY, snapshot;

        function initWB() {
            const canvas = document.getElementById('wb-canvas');
            if (!canvas || canvas.dataset.init) return;
            canvas.dataset.init = '1';
            wbCtx = canvas.getContext('2d');
            wbCtx.fillStyle = '#0b0b16';
            wbCtx.fillRect(0, 0, canvas.width, canvas.height);

            canvas.addEventListener('mousedown', e => {
                wbDrawing = true;
                const r = canvas.getBoundingClientRect();
                const scaleX = canvas.width / r.width;
                const scaleY = canvas.height / r.height;
                startX = (e.clientX - r.left) * scaleX;
                startY = (e.clientY - r.top) * scaleY;
                snapshot = wbCtx.getImageData(0, 0, canvas.width, canvas.height);
                wbCtx.beginPath();
                wbCtx.moveTo(startX, startY);
            });

            canvas.addEventListener('mousemove', e => {
                if (!wbDrawing) return;
                const r = canvas.getBoundingClientRect();
                const scaleX = canvas.width / r.width;
                const scaleY = canvas.height / r.height;
                const x = (e.clientX - r.left) * scaleX;
                const y = (e.clientY - r.top) * scaleY;

                if (wbTool === 'pen' || wbTool === 'eraser') {
                    wbCtx.strokeStyle = wbTool === 'eraser' ? '#0b0b16' : wbColor;
                    wbCtx.lineWidth = wbTool === 'eraser' ? 24 : brushSz;
                    wbCtx.lineCap = 'round';
                    wbCtx.lineTo(x, y);
                    wbCtx.stroke();
                } else {
                    wbCtx.putImageData(snapshot, 0, 0);
                    wbCtx.strokeStyle = wbColor;
                    wbCtx.lineWidth = brushSz;
                    wbCtx.beginPath();
                    if (wbTool === 'line') { wbCtx.moveTo(startX, startY); wbCtx.lineTo(x, y); wbCtx.stroke(); }
                    if (wbTool === 'rect') { wbCtx.strokeRect(startX, startY, x - startX, y - startY); }
                    if (wbTool === 'circle') {
                        const r2 = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);
                        wbCtx.arc(startX, startY, r2, 0, Math.PI * 2);
                        wbCtx.stroke();
                    }
                }
            });

            canvas.addEventListener('mouseup', e => {
                if (wbTool === 'text') {
                    const r = canvas.getBoundingClientRect();
                    const x = (e.clientX - r.left) * (canvas.width / r.width);
                    const y = (e.clientY - r.top) * (canvas.height / r.height);
                    const txt = prompt('Enter text:');
                    if (txt) {
                        wbCtx.fillStyle = wbColor;
                        wbCtx.font = `${14 + brushSz * 2}px DM Sans`;
                        wbCtx.fillText(txt, x, y);
                    }
                }
                wbDrawing = false;
                wbCtx.beginPath();
            });

            canvas.addEventListener('mouseleave', () => { wbDrawing = false; wbCtx.beginPath(); });
            // Touch support
function getTouchPos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
        x: (t.clientX - r.left) * (canvas.width / r.width),
        y: (t.clientY - r.top) * (canvas.height / r.height)
    };
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const pos = getTouchPos(e);
    wbDrawing = true;
    startX = pos.x;
    startY = pos.y;
    snapshot = wbCtx.getImageData(0, 0, canvas.width, canvas.height);
    wbCtx.beginPath();
    wbCtx.moveTo(startX, startY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!wbDrawing) return;
    const pos = getTouchPos(e);
    if (wbTool === 'pen' || wbTool === 'eraser') {
        wbCtx.strokeStyle = wbTool === 'eraser' ? '#0b0b16' : wbColor;
        wbCtx.lineWidth = wbTool === 'eraser' ? 24 : brushSz;
        wbCtx.lineCap = 'round';
        wbCtx.lineTo(pos.x, pos.y);
        wbCtx.stroke();
    } else {
        wbCtx.putImageData(snapshot, 0, 0);
        wbCtx.strokeStyle = wbColor;
        wbCtx.lineWidth = brushSz;
        wbCtx.beginPath();
        if (wbTool === 'line') { wbCtx.moveTo(startX, startY); wbCtx.lineTo(pos.x, pos.y); wbCtx.stroke(); }
        if (wbTool === 'rect') { wbCtx.strokeRect(startX, startY, pos.x - startX, pos.y - startY); }
        if (wbTool === 'circle') {
            const r2 = Math.sqrt((pos.x - startX) ** 2 + (pos.y - startY) ** 2);
            wbCtx.arc(startX, startY, r2, 0, Math.PI * 2);
            wbCtx.stroke();
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    wbDrawing = false;
    wbCtx.beginPath();
});
        }

        function setTool(t, el) {
            wbTool = t;
            document.querySelectorAll('.wb-tool-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            const canvas = document.getElementById('wb-canvas');
            if (canvas) canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'text' ? 'text' : 'crosshair';
        }

        function setColor(c, el) {
            wbColor = c;
            document.querySelectorAll('.wb-color').forEach(b => b.classList.remove('selected'));
            if (el) el.classList.add('selected');
        }

        function clearWB() {
            if (!wbCtx) return;
            const canvas = document.getElementById('wb-canvas');
            wbCtx.fillStyle = '#0b0b16';
            wbCtx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveWB() {
            const canvas = document.getElementById('wb-canvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.download = 'collabsync-whiteboard.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }
        initWB();
    </script>
    <script>
    const hamBtn = document.getElementById('hamBtn');
    const mobDrawer = document.getElementById('mobDrawer');
    hamBtn.addEventListener('click', () => {
        hamBtn.classList.toggle('open');
        mobDrawer.classList.toggle('open');
    });
    mobDrawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
        hamBtn.classList.remove('open');
        mobDrawer.classList.remove('open');
    }));
</script>
</body>

</html>
