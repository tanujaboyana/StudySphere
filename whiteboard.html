/* ── Hamburger ── */
.ham {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    flex-shrink: 0;
    margin-left: auto;
}
.ham span {
    display: block;
    width: 20px;
    height: 2px;
    background: #e2e8f0;
    border-radius: 2px;
    transition: all 0.3s;
}
.ham.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.ham.open span:nth-child(2) { opacity: 0; }
.ham.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.mob-drawer {
    display: none;
    position: fixed;
    top: 56px;
    left: 0; right: 0;
    background: rgba(7,7,13,0.98);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px;
    flex-direction: column;
    gap: 6px;
    z-index: 999;
    transform: translateY(-110%);
    transition: transform 0.3s ease;
}
.mob-drawer.open { transform: translateY(0); }
.mob-drawer .nav-link {
    display: block;
    padding: 10px 14px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
}
.mob-drawer .nav-link.active,
.mob-drawer .nav-link:hover {
    color: #e2e8f0;
    background: rgba(255,255,255,0.05);
}

<!-- ══════════════════════════════════════════════════════════
     THEME SYSTEM — runs immediately, outside fetch() and
     outside profile-container so it never gets overwritten
══════════════════════════════════════════════════════════ -->
<script>
(function(){
    const DARK  = {'--bg':'#07070d','--surface':'#0e0e18','--card':'#13131f','--border':'#1c1c2e','--text':'#e2e8f0','--muted':'#64748b','--dim':'#1e293b','--glow':'#8b5cf6','--teal-glow':'#22d3ee','--green-glow':'#10b981','--orange-glow':'#f59e0b','--accent':'#6d28d9'};
    const LIGHT = {'--bg':'#f4f5fa','--surface':'#ffffff','--card':'#ffffff','--border':'#e2e8f0','--text':'#0f172a','--muted':'#64748b','--dim':'#e2e8f0','--glow':'#7c3aed','--teal-glow':'#0ea5e9','--green-glow':'#10b981','--orange-glow':'#f59e0b','--accent':'#6d28d9'};

    window.applyTheme = function(mode) {
        const vars = mode === 'dark' ? DARK : LIGHT;
        const root = document.documentElement;
        const isLight = mode === 'light';

        // 1. CSS variables
        Object.keys(vars).forEach(k => root.style.setProperty(k, vars[k]));
        // 2. data-theme fires [data-theme="light"] CSS rules in stylesheet1.css
        root.setAttribute('data-theme', mode);
        // 3. Force bg + text on html & body
        root.style.setProperty('background', vars['--bg'], 'important');
        root.style.setProperty('color',      vars['--text'], 'important');
        document.body.style.setProperty('background', vars['--bg'], 'important');
        document.body.style.setProperty('color',      vars['--text'], 'important');

        // 4. NAV — solid white in light, dark glass in dark
        const nav = document.getElementById('main-nav');
        if (nav) {
            nav.style.setProperty('background',          isLight ? '#ffffff'                      : 'rgba(7,7,13,0.85)',      'important');
            nav.style.setProperty('border-bottom-color', isLight ? '#e2e8f0'                      : 'rgba(255,255,255,0.06)', 'important');
            nav.style.setProperty('box-shadow',          isLight ? '0 1px 12px rgba(0,0,0,0.08)' : 'none',                   'important');
            nav.style.setProperty('backdrop-filter',     isLight ? 'none'                         : 'blur(20px)',             'important');
        }

        // 5. Nav links — dark readable text in light mode
        document.querySelectorAll('.nav-link').forEach(a => {
            const active = a.classList.contains('active');
            a.style.setProperty('color',                   isLight ? (active ? '#6d28d9' : '#475569') : '', 'important');
            a.style.setProperty('-webkit-text-fill-color', isLight ? (active ? '#6d28d9' : '#475569') : '', 'important');
            a.style.background  = isLight ? (active ? 'rgba(109,40,217,0.12)' : '') : '';
            a.style.borderColor = isLight ? (active ? 'rgba(109,40,217,0.35)' : 'transparent') : '';
        });

        // 6. Mobile drawer
        const drawer = document.getElementById('mobDrawer');
        if (drawer) {
            drawer.style.setProperty('background',   isLight ? 'rgba(255,255,255,0.98)' : '', 'important');
            drawer.style.setProperty('border-color', isLight ? '#e2e8f0'                : '', 'important');
        }
        document.querySelectorAll('#mobDrawer .nav-link').forEach(a => {
            a.style.color = isLight ? (a.classList.contains('active') ? '#6d28d9' : '#475569') : '';
        });

        // 7. Hamburger lines
        document.querySelectorAll('.ham span').forEach(s => { s.style.background = isLight ? '#475569' : ''; });

        // 8. Cards
        document.querySelectorAll('.card,.kpi-card,.subject-room-card').forEach(el => {
            el.style.background  = isLight ? '#ffffff' : '';
            el.style.borderColor = isLight ? '#e2e8f0' : '';
            el.style.color       = isLight ? '#0f172a' : '';
        });

        // 9. Profile dropdown toggle buttons
        const btnD = document.getElementById('btn-dark');
        const btnL = document.getElementById('btn-light');
        const lbl  = document.getElementById('theme-row-label');
        if (btnD) btnD.classList.toggle('active', mode === 'dark');
        if (btnL) btnL.classList.toggle('active', mode === 'light');
        if (lbl)  lbl.textContent = isLight ? '☀️ Theme' : '🌙 Theme';

        localStorage.setItem('ss-theme', mode);
    };

    // Apply immediately — no waiting for fetch
    window.applyTheme(localStorage.getItem('ss-theme') || 'dark');

    // Re-apply after DOM ready (catches nav links)
    document.addEventListener('DOMContentLoaded', () => {
        window.applyTheme(localStorage.getItem('ss-theme') || 'dark');
    });
})();
</script>

<!-- Profile fetch — runs AFTER theme is applied above -->
<script>
fetch('profile.html').then(r=>r.text()).then(html=>{
    document.getElementById('profile-container').innerHTML = html;

    const lb = document.getElementById('logout-btn');
    if (lb) lb.addEventListener('click', e => {
        e.preventDefault();
        import("https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js")
            .then(({getAuth,signOut}) => signOut(getAuth()).then(() => window.location.href='login.html'));
    });

    const pb = document.getElementById('profile-btn');
    const pm = document.getElementById('profile-menu');
    if (pb && pm) {
        pb.addEventListener('click', e => { e.stopPropagation(); pm.style.display = pm.style.display==='block' ? 'none' : 'block'; });
        document.addEventListener('click', e => { if (!pb.contains(e.target) && !pm.contains(e.target)) pm.style.display = 'none'; });
    }

    // Re-apply so profile Dark/Light buttons reflect current state
    window.applyTheme(localStorage.getItem('ss-theme') || 'dark');

}).catch(e => console.error('Profile load failed:', e));
</script>
    <script>
        let wbCtx, wbDrawing = false, wbTool = 'pen', wbColor = '#8b5cf6', brushSz = 3;
        let startX, startY, snapshot;

        function initWB() {
            const canvas = document.getElementById('wb-canvas');
            if (!canvas || canvas.dataset.init) return;
            canvas.dataset.init = '1';
            wbCtx = canvas.getContext('2d');
            wbCtx.fillStyle = '#0b0b16';
            wbCtx.fillRect(0, 0, canvas.width, canvas.height);

            canvas.addEventListener('mousedown', e => {
                wbDrawing = true;
                const r = canvas.getBoundingClientRect();
                const scaleX = canvas.width / r.width;
                const scaleY = canvas.height / r.height;
                startX = (e.clientX - r.left) * scaleX;
                startY = (e.clientY - r.top) * scaleY;
                snapshot = wbCtx.getImageData(0, 0, canvas.width, canvas.height);
                wbCtx.beginPath();
                wbCtx.moveTo(startX, startY);
            });

            canvas.addEventListener('mousemove', e => {
                if (!wbDrawing) return;
                const r = canvas.getBoundingClientRect();
                const scaleX = canvas.width / r.width;
                const scaleY = canvas.height / r.height;
                const x = (e.clientX - r.left) * scaleX;
                const y = (e.clientY - r.top) * scaleY;

                if (wbTool === 'pen' || wbTool === 'eraser') {
                    wbCtx.strokeStyle = wbTool === 'eraser' ? '#0b0b16' : wbColor;
                    wbCtx.lineWidth = wbTool === 'eraser' ? 24 : brushSz;
                    wbCtx.lineCap = 'round';
                    wbCtx.lineTo(x, y);
                    wbCtx.stroke();
                } else {
                    wbCtx.putImageData(snapshot, 0, 0);
                    wbCtx.strokeStyle = wbColor;
                    wbCtx.lineWidth = brushSz;
                    wbCtx.beginPath();
                    if (wbTool === 'line') { wbCtx.moveTo(startX, startY); wbCtx.lineTo(x, y); wbCtx.stroke(); }
                    if (wbTool === 'rect') { wbCtx.strokeRect(startX, startY, x - startX, y - startY); }
                    if (wbTool === 'circle') {
                        const r2 = Math.sqrt((x - startX) ** 2 + (y - startY) ** 2);
                        wbCtx.arc(startX, startY, r2, 0, Math.PI * 2);
                        wbCtx.stroke();
                    }
                }
            });

            canvas.addEventListener('mouseup', e => {
                if (wbTool === 'text') {
                    const r = canvas.getBoundingClientRect();
                    const x = (e.clientX - r.left) * (canvas.width / r.width);
                    const y = (e.clientY - r.top) * (canvas.height / r.height);
                    const txt = prompt('Enter text:');
                    if (txt) {
                        wbCtx.fillStyle = wbColor;
                        wbCtx.font = `${14 + brushSz * 2}px DM Sans`;
                        wbCtx.fillText(txt, x, y);
                    }
                }
                wbDrawing = false;
                wbCtx.beginPath();
            });

            canvas.addEventListener('mouseleave', () => { wbDrawing = false; wbCtx.beginPath(); });
            // Touch support
function getTouchPos(e) {
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    return {
        x: (t.clientX - r.left) * (canvas.width / r.width),
        y: (t.clientY - r.top) * (canvas.height / r.height)
    };
}

canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const pos = getTouchPos(e);
    wbDrawing = true;
    startX = pos.x;
    startY = pos.y;
    snapshot = wbCtx.getImageData(0, 0, canvas.width, canvas.height);
    wbCtx.beginPath();
    wbCtx.moveTo(startX, startY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (!wbDrawing) return;
    const pos = getTouchPos(e);
    if (wbTool === 'pen' || wbTool === 'eraser') {
        wbCtx.strokeStyle = wbTool === 'eraser' ? '#0b0b16' : wbColor;
        wbCtx.lineWidth = wbTool === 'eraser' ? 24 : brushSz;
        wbCtx.lineCap = 'round';
        wbCtx.lineTo(pos.x, pos.y);
        wbCtx.stroke();
    } else {
        wbCtx.putImageData(snapshot, 0, 0);
        wbCtx.strokeStyle = wbColor;
        wbCtx.lineWidth = brushSz;
        wbCtx.beginPath();
        if (wbTool === 'line') { wbCtx.moveTo(startX, startY); wbCtx.lineTo(pos.x, pos.y); wbCtx.stroke(); }
        if (wbTool === 'rect') { wbCtx.strokeRect(startX, startY, pos.x - startX, pos.y - startY); }
        if (wbTool === 'circle') {
            const r2 = Math.sqrt((pos.x - startX) ** 2 + (pos.y - startY) ** 2);
            wbCtx.arc(startX, startY, r2, 0, Math.PI * 2);
            wbCtx.stroke();
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    wbDrawing = false;
    wbCtx.beginPath();
});
        }

        function setTool(t, el) {
            wbTool = t;
            document.querySelectorAll('.wb-tool-btn').forEach(b => b.classList.remove('active'));
            if (el) el.classList.add('active');
            const canvas = document.getElementById('wb-canvas');
            if (canvas) canvas.style.cursor = t === 'eraser' ? 'cell' : t === 'text' ? 'text' : 'crosshair';
        }

        function setColor(c, el) {
            wbColor = c;
            document.querySelectorAll('.wb-color').forEach(b => b.classList.remove('selected'));
            if (el) el.classList.add('selected');
        }

        function clearWB() {
            if (!wbCtx) return;
            const canvas = document.getElementById('wb-canvas');
            wbCtx.fillStyle = '#0b0b16';
            wbCtx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveWB() {
            const canvas = document.getElementById('wb-canvas');
            if (!canvas) return;
            const a = document.createElement('a');
            a.download = 'collabsync-whiteboard.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        }
        initWB();
    </script>

    };

    setTimeout(update, 500);
