<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | StudySphere AI</title>
    <link rel="stylesheet" href="stylesheet1.css">
    <style>
        .profile-page { padding: 36px 0 60px; }

        /* ── HERO ── */
        .profile-hero {
            background: linear-gradient(135deg, rgba(109,40,217,0.12), rgba(8,145,178,0.06));
            border: 1px solid rgba(109,40,217,0.3);
            border-radius: 24px;
            padding: 32px 36px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 28px;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .profile-hero::before {
            content: '';
            position: absolute; top: -80px; right: -80px;
            width: 260px; height: 260px; border-radius: 50%;
            background: radial-gradient(circle, rgba(109,40,217,0.15), transparent 70%);
            pointer-events: none;
        }

        /* ── AVATAR ── */
        .avatar-wrap { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
        .avatar-spin-ring {
            position: absolute; inset: -4px; border-radius: 50%;
            background: conic-gradient(var(--glow), var(--teal-glow), var(--green-glow), var(--glow));
            animation: spin-slow 4s linear infinite;
        }
        @keyframes spin-slow { to { transform: rotate(360deg); } }
        .avatar-inner {
            position: absolute; inset: 4px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--teal));
            display: flex; align-items: center; justify-content: center;
            font-family: var(--syne); font-weight: 900; font-size: 32px; color: white; z-index: 1;
        }
        .avatar-online {
            position: absolute; bottom: 4px; right: 4px;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--green-glow); border: 2px solid var(--bg);
            box-shadow: 0 0 8px var(--green-glow); z-index: 2;
        }

        /* ── STAT CARDS ── */
        .stat-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 22px; text-align: center; transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
        .stat-val { font-family: var(--syne); font-size: 30px; font-weight: 900; margin-bottom: 4px; }
        .stat-lbl { font-size: 12px; color: var(--muted); }

        /* ── HEATMAP ── */
        .heatmap-section {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 24px; margin-bottom: 24px;
        }
        .heatmap-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .heatmap-grid { display: grid; grid-template-columns: repeat(53,1fr); gap: 3px; }
        .hmap-cell {
            aspect-ratio: 1; border-radius: 2px; background: rgba(109,40,217,0.07);
            cursor: pointer; transition: transform 0.1s;
        }
        .hmap-cell:hover { transform: scale(1.5); z-index: 5; position: relative; }
        .hmap-cell.l1 { background: rgba(109,40,217,0.22); }
        .hmap-cell.l2 { background: rgba(109,40,217,0.44); }
        .hmap-cell.l3 { background: rgba(109,40,217,0.67); }
        .hmap-cell.l4 { background: rgba(139,92,246,0.92); box-shadow: 0 0 4px rgba(139,92,246,0.5); }
        .hmap-months { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 7px; padding: 0 1px; }
        .hmap-legend { display: flex; align-items: center; gap: 5px; margin-top: 12px; font-size: 11px; color: var(--muted); }
        .hmap-swatch { width: 12px; height: 12px; border-radius: 2px; }

        /* ── PROFILE GRID ── */
        .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .skill-section { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; }
        .skill-row { margin-bottom: 16px; }
        .skill-row:last-child { margin-bottom: 0; }
        .skill-meta { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 7px; }
        .rings-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 24px; display: flex; flex-direction: column; align-items: center;
        }
        .rings-card svg { overflow: visible; }

        /* ── SESSIONS ── */
        .sessions-section { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 24px; }
        .session-item {
            display: flex; align-items: center; gap: 14px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .session-item:last-child { border-bottom: none; padding-bottom: 0; }
        .session-icon-box { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .session-info { flex: 1; }
        .session-info strong { font-size: 13px; font-weight: 600; display: block; margin-bottom: 2px; }
        .session-info span { font-size: 11px; color: var(--muted); }
        .session-xp { font-family: var(--syne); font-weight: 800; font-size: 13px; color: var(--green-glow); }
        .card-title { font-family: var(--syne); font-weight: 800; font-size: 15px; margin-bottom: 18px; }

        /* ── EDIT MODAL ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            z-index: 3000; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 32px; width: 100%;
            max-width: 480px; position: relative;
            box-shadow: 0 0 60px rgba(109,40,217,0.25);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn { from{opacity:0;transform:translateY(20px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
        .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
        .modal-close:hover { color: #fff; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
        .form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: #fff; font-size: 13px; outline: none; box-sizing: border-box; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--accent); }

        /* ── LOADING SKELETON ── */
        .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        /* ── NOT LOGGED IN ── */
        .auth-wall { text-align: center; padding: 80px 20px; }
        .auth-wall-icon { font-size: 56px; margin-bottom: 16px; }
        .auth-wall h2 { font-family: var(--syne); font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .auth-wall p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

        /* ── ACTIVITY BADGES ── */
        .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        @media (max-width: 768px) {
            .profile-hero { grid-template-columns: auto 1fr; }
            .stat-row { grid-template-columns: 1fr 1fr; }
            .profile-grid { grid-template-columns: 1fr; }
            .heatmap-grid { grid-template-columns: repeat(26,1fr); }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="scanlines"></div>

    <nav id="main-nav">
        <a href="landing.html" class="nav-logo">
            <div class="nav-logo-icon">🔗</div>CollabSync AI
        </a>
        <div class="nav-links" id="navLinks">
            <a class="nav-link" href="landing.html">Intro</a>
            <a class="nav-link" href="dashboard.html">Dashboard</a>
            <a class="nav-link" href="match.html">Match</a>
            <a class="nav-link" href="session.html">Session</a>
            <a class="nav-link" href="leaderboard.html">Leaderboard</a>
            <a class="nav-link" href="whiteboard.html">Whiteboard</a>
            <a class="nav-link" href="resources.html">Resources</a>
            <a class="nav-link" href="pomodoro.html">Pomodoro</a>
            <a class="nav-link" href="onboard.html">Onboard</a>
            
        </div>
    </nav>

    <div id="profile-container" style="position:fixed;top:0;right:20px;width:250px;z-index:1000;"></div>

    <!-- ══ EDIT PROFILE MODAL ══ -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <button class="modal-close" onclick="closeEditModal()">✕</button>
            <h2 style="font-family:var(--syne);font-weight:800;font-size:18px;margin-bottom:20px;">✏️ Edit Profile</h2>
            <div class="form-group">
                <label class="form-label">Display Name</label>
                <input class="form-input" id="editName" placeholder="Your name">
            </div>
            <div class="form-group">
                <label class="form-label">Study Subjects (comma separated)</label>
                <input class="form-input" id="editSubjects" placeholder="e.g. Computer Science, Biology">
            </div>
            <div class="form-group">
                <label class="form-label">Bio</label>
                <input class="form-input" id="editBio" placeholder="A short bio about yourself">
            </div>
            <div class="form-group">
                <label class="form-label">Weekly Study Hours Goal</label>
                <input class="form-input" id="editGoalHours" type="number" min="1" max="80" placeholder="10">
            </div>
            <button class="btn btn-primary" style="width:100%;padding:11px;font-size:14px;" onclick="saveProfile()" id="saveProfileBtn">
                Save Changes →
            </button>
        </div>
    </div>

    <!-- ══ MAIN CONTENT ══ -->
    <div class="content-wrapper">
        <div id="page-profile" class="page">
            <div class="profile-page">
                <div class="content" id="profileContent">
                    <!-- Rendered by JS -->
                    <div style="padding:80px 0;text-align:center;">
                        <div class="skeleton" style="width:90px;height:90px;border-radius:50%;margin:0 auto 20px;"></div>
                        <div class="skeleton" style="width:220px;height:24px;margin:0 auto 12px;"></div>
                        <div class="skeleton" style="width:160px;height:14px;margin:0 auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ FIREBASE ══ -->
    <script type="module">
        import { initializeApp }         from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
        import {
            getFirestore, doc, getDoc, updateDoc, collection,
            query, orderBy, limit, onSnapshot, where, getDocs, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgmy0go1YLZFUf5c8nEOWDWm-wRkdIvqQ",
            authDomain: "collabsyncai.firebaseapp.com",
            projectId: "collabsyncai",
            storageBucket: "collabsyncai.firebasestorage.app",
            messagingSenderId: "862378374401",
            appId: "1:862378374401:web:4438203269261b15011700"
        };

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        let CU = null;

        // ── expose to window for inline onclick
        window.closeEditModal  = closeEditModal;
        window.saveProfile     = saveProfile;
        window.openEditModal   = openEditModal;

        // ── colour helper (same as dashboard)
        const pc = uid => {
            const c = ['#6a4dff','#4d94ff','#00c9a7','#f59e0b','#10b981','#ef4444','#8b5cf6','#0ea5e9'];
            return c[(uid?.charCodeAt(0)||0) % c.length];
        };

        const esc = t => { const d = document.createElement('div'); d.appendChild(document.createTextNode(t||'')); return d.innerHTML; };

        const fmtDate = ts => {
            if (!ts?.toDate) return '—';
            return ts.toDate().toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
        };

        const calcLevel = xp => {
            // level thresholds: level N requires N*300 XP (simple curve)
            let lvl = 1, needed = 300;
            while (xp >= needed) { xp -= needed; lvl++; needed = lvl * 300; }
            return { level: lvl, current: xp, needed };
        };

        // ── Auth gate
        onAuthStateChanged(auth, async user => {
            if (!user) {
                renderAuthWall();
                return;
            }
            CU = user;
            // Real-time listener on user doc
            onSnapshot(doc(db, 'users', user.uid), snap => {
                const data = snap.exists() ? snap.data() : {};
                renderProfile(user, data);
            });
        });

        // ── NOT LOGGED IN
        function renderAuthWall() {
            document.getElementById('profileContent').innerHTML = `
                <div class="auth-wall">
                    <div class="auth-wall-icon">🔐</div>
                    <h2>Sign in to view your profile</h2>
                    <p>Your stats, skills, sessions and activity are all here — once you log in.</p>
                    <a href="login.html" class="btn btn-primary" style="padding:12px 32px;font-size:14px;">Log In →</a>
                </div>`;
        }

        // ══════════════════════════════════════════════════════
        // MAIN RENDER
        // ══════════════════════════════════════════════════════
        async function renderProfile(user, data) {
            const name     = data.displayName || user.displayName || user.email?.split('@')[0] || 'Scholar';
            const email    = user.email || '';
            const color    = data.color || pc(user.uid);
            const xp       = data.xp || 0;
            const streak   = data.streak || 0;
            const { level, current, needed } = calcLevel(xp);
            const pct      = Math.round((current / needed) * 100);
            const subjects = data.subjects || data.skills?.map(s=>s.name) || [];
            const bio      = data.bio || '';
            const joined   = fmtDate(data.createdAt);
            const goals    = data.goals || {};
            const matchScore  = data.matchScore || 0;
            const matchedCount = data.matchedCount || 0;

            // Build dynamic badges
            const badges = [];
            if (streak >= 7)  badges.push(`<span class="badge" style="background:rgba(109,40,217,0.18);color:var(--glow);">🔥 ${streak}-Day Streak</span>`);
            if (xp >= 1000)   badges.push(`<span class="badge" style="background:rgba(8,145,178,0.15);color:var(--teal-glow);">⚡ Top Collaborator</span>`);
            if (matchedCount >= 5) badges.push(`<span class="badge" style="background:rgba(5,150,105,0.15);color:var(--green-glow);">🎓 Mentor Badge</span>`);
            if (level >= 10)  badges.push(`<span class="badge" style="background:rgba(217,119,6,0.15);color:var(--orange-glow);">📈 Rising Star</span>`);
            if (badges.length === 0) badges.push(`<span class="badge" style="background:rgba(255,255,255,0.06);color:var(--muted);">🌱 Getting Started</span>`);

            // ── Fetch follower / following counts
            let followersCount = 0, followingCount = 0;
            try {
                const [frs, fwg] = await Promise.all([
                    getDocs(collection(db, 'social', user.uid, 'followers')),
                    getDocs(collection(db, 'social', user.uid, 'following'))
                ]);
                followersCount = frs.size;
                followingCount = fwg.size;
            } catch(e) {}

            // ── Fetch recent activity for sessions section
            let recentActivity = [];
            try {
                const actQ = query(
                    collection(db, 'activity'),
                    where('uid', '==', user.uid),
                    orderBy('createdAt', 'desc'),
                    limit(5)
                );
                const actSnap = await getDocs(actQ);
                recentActivity = actSnap.docs.map(d => d.data());
            } catch(e) {}

            // ── Session count from activity
            const sessionsDone = recentActivity.filter(a => a.type === 'join' || a.type === 'session').length || data.sessionsCount || 0;

            // ── Goals
            const studyHours = goals.studyHours || 0;
            const studyTarget = goals.studyHoursTarget || 10;
            const teachings  = goals.peerTeachings || 0;
            const quizAvg    = goals.quizAvg || 0;
            const overallGoal = Math.round(((Math.min(studyHours/studyTarget,1) + Math.min(teachings/5,1) + Math.min(quizAvg/100,1)) / 3) * 100);

            // ── Skill bars from onboarding data
            const skills = data.skills || [];
            const skillColors = ['var(--glow)','var(--teal-glow)','var(--green-glow)','var(--orange-glow)','#f472b6','var(--glow)'];
            const skillBarsHTML = skills.length
                ? skills.map((s, i) => {
                    const pct = Math.round((s.confidence / 5) * 100);
                    const col = skillColors[i % skillColors.length];
                    return `<div class="skill-row">
                        <div class="skill-meta">
                            <span>${esc(s.name)}</span>
                            <span style="color:${col};font-weight:700;">${pct}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill skill-fill" data-pct="${pct}" style="width:0%;background:linear-gradient(90deg,${col},${col});"></div>
                        </div>
                    </div>`;
                }).join('')
                : `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">
                    No skills added yet.<br>
                    <a href="onboard.html" style="color:var(--glow);">Complete onboarding →</a>
                  </div>`;

            // ── Recent activity feed as sessions
            const activityIcons = { join:'🚪', message:'💬', create:'🏠', match:'🎯', quiz:'📝', xp:'⚡', leave:'👋', session:'📚' };
            const actColors = ['rgba(109,40,217,0.15)','rgba(8,145,178,0.15)','rgba(5,150,105,0.15)','rgba(217,119,6,0.15)','rgba(219,39,119,0.15)'];
            const sessionsHTML = recentActivity.length
                ? recentActivity.map((a, i) => {
                    const t = a.createdAt?.toDate?.()?.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) || 'Recently';
                    const icon = activityIcons[a.type] || '📡';
                    const bg = actColors[i % actColors.length];
                    return `<div class="session-item">
                        <div class="session-icon-box" style="background:${bg};">${icon}</div>
                        <div class="session-info">
                            <strong>${esc(a.detail || a.type)}</strong>
                            <span>${t}</span>
                        </div>
                        <div class="session-xp">+${Math.floor(Math.random()*200+50)} XP</div>
                    </div>`;
                }).join('')
                : `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px 0;">No recent activity yet — start collaborating!</div>`;

            // ═══════════════════════════════════════════
            // BUILD THE PAGE HTML
            // ═══════════════════════════════════════════
            document.getElementById('profileContent').innerHTML = `

                <!-- HERO -->
                <div class="profile-hero">
                    <div class="avatar-wrap">
                        <div class="avatar-spin-ring"></div>
                        <div class="avatar-inner" style="background:linear-gradient(135deg,${color},${color}aa);">${name[0].toUpperCase()}</div>
                        <div class="avatar-online"></div>
                    </div>

                    <div>
                        <div class="section-tag" style="margin-bottom:10px;">Your Profile</div>
                        <h2 style="font-family:var(--syne);font-weight:900;font-size:26px;margin-bottom:4px;">${esc(name)}</h2>
                        <p style="color:var(--muted);font-size:13px;margin-bottom:4px;">
                            ${subjects.length ? '📍 ' + subjects.map(esc).join(' & ') + ' · ' : ''}
                            Level ${level} Scholar
                            ${joined !== '—' ? ' · Joined ' + joined : ''}
                        </p>
                        ${bio ? `<p style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:12px;">${esc(bio)}</p>` : '<div style="height:12px;"></div>'}
                        <div class="badge-row">${badges.join('')}</div>
                    </div>

                    <div style="text-align:right;">
                        <div style="font-family:var(--syne);font-weight:900;font-size:38px;background:linear-gradient(135deg,var(--glow),var(--teal-glow));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;">${xp.toLocaleString()}</div>
                        <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">XP Points</div>
                        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px;width:140px;margin-left:auto;">
                            <span>Lv ${level}</span><span>Lv ${level+1}</span>
                        </div>
                        <div class="progress-bar" style="width:140px;margin-left:auto;">
                            <div class="progress-fill" style="width:${pct}%;"></div>
                        </div>
                        <div style="font-size:10px;color:var(--muted);margin-top:4px;">${current.toLocaleString()} / ${needed.toLocaleString()} XP</div>
                        <button class="btn btn-outline" style="margin-top:14px;font-size:12px;padding:8px 20px;" onclick="openEditModal()">✏️ Edit Profile</button>
                    </div>
                </div>

                <!-- STAT CARDS -->
                <div class="stat-row">
                    <div class="stat-card">
                        <div style="font-size:22px;margin-bottom:6px;">📚</div>
                        <div class="stat-val" style="color:var(--glow);">${sessionsDone}</div>
                        <div class="stat-lbl">Sessions Done</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size:22px;margin-bottom:6px;">⏱️</div>
                        <div class="stat-val" style="color:var(--teal-glow);">${studyHours}h</div>
                        <div class="stat-lbl">Study Hours</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size:22px;margin-bottom:6px;">🤝</div>
                        <div class="stat-val" style="color:var(--green-glow);">${matchedCount}</div>
                        <div class="stat-lbl">Partners Matched</div>
                    </div>
                    <div class="stat-card">
                        <div style="font-size:22px;margin-bottom:6px;">🎯</div>
                        <div class="stat-val" style="color:var(--orange-glow);">${matchScore}%</div>
                        <div class="stat-lbl">Avg Match Score</div>
                    </div>
                </div>

                <!-- SOCIAL MINI STATS -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
                    <div class="stat-card" style="display:flex;align-items:center;gap:16px;text-align:left;padding:16px 20px;">
                        <div style="font-size:28px;">👤</div>
                        <div>
                            <div class="stat-val" style="color:var(--teal-glow);font-size:22px;">${followersCount}</div>

                        <div class="hmap-swatch" style="background:rgba(109,40,217,0.22);"></div>
                        <div class="hmap-swatch" style="background:rgba(109,40,217,0.44);"></div>
                        <div class="hmap-swatch" style="background:rgba(109,40,217,0.67);"></div>

                    </div>
                </div>

                <!-- SKILLS + RINGS -->
                <div class="profile-grid">
                    <div class="skill-section">

                        <svg width="170" height="170" viewBox="0 0 170 170">
                            <circle cx="85" cy="85" r="72" fill="none" stroke="rgba(109,40,217,0.12)" stroke-width="12"/>
                            <circle cx="85" cy="85" r="54" fill="none" stroke="rgba(8,145,178,0.12)" stroke-width="12"/>
                            <circle cx="85" cy="85" r="36" fill="none" stroke="rgba(5,150,105,0.12)" stroke-width="12"/>
                            <circle cx="85" cy="85" r="72" fill="none" stroke="url(#rg1)" stroke-width="12" stroke-linecap="round"
                                stroke-dasharray="452.4"
                                stroke-dashoffset="${452.4 - (452.4 * Math.min(studyHours/studyTarget,1))}"
                                transform="rotate(-90 85 85)"/>
                            <circle cx="85" cy="85" r="54" fill="none" stroke="url(#rg2)" stroke-width="12" stroke-linecap="round"
                                stroke-dasharray="339.3"
                                stroke-dashoffset="${339.3 - (339.3 * Math.min(teachings/5,1))}"
                                transform="rotate(-90 85 85)"/>
                            <circle cx="85" cy="85" r="36" fill="none" stroke="url(#rg3)" stroke-width="12" stroke-linecap="round"
                                stroke-dasharray="226.2"
                                stroke-dashoffset="${226.2 - (226.2 * Math.min(quizAvg/100,1))}"
                                transform="rotate(-90 85 85)"/>
                            <defs>
                                <linearGradient id="rg1" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#8b5cf6"/>
                                </linearGradient>
                                <linearGradient id="rg2" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#0891b2"/><stop offset="100%" stop-color="#22d3ee"/>
                                </linearGradient>
                                <linearGradient id="rg3" x1="0%" y1="0%" x2="100%" y2="0%">

                                <span style="font-weight:600;color:var(--glow);">${studyHours} / ${studyTarget}h</span>
                            </div>
                            <div class="progress-bar" style="height:5px;">
                                <div class="progress-fill" style="width:${Math.min(100,Math.round(studyHours/studyTarget*100))}%;"></div>
                            </div>
                            <div style="display:flex;justify-content:space-between;font-size:13px;">
                                <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--teal-glow);margin-right:6px;vertical-align:middle;"></span>Peer Teachings</span>
                                <span style="font-weight:600;color:var(--teal-glow);">${teachings} / 5</span>
                            </div>
                            <div class="progress-bar" style="height:5px;">
                                <div class="progress-fill" style="width:${Math.min(100,teachings*20)}%;background:linear-gradient(90deg,var(--teal),var(--teal-glow));"></div>

                            <div style="display:flex;justify-content:space-between;font-size:13px;">
                                <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green-glow);margin-right:6px;vertical-align:middle;"></span>Quiz Avg</span>
                                <span style="font-weight:600;color:var(--green-glow);">${quizAvg}%</span>
                            </div>
                            <div class="progress-bar" style="height:5px;">

                <div class="sessions-section">

                    ${sessionsHTML}

            `;

            // ── Animate skill bars
            setTimeout(() => {
                document.querySelectorAll('.skill-fill').forEach(el => {
                    el.style.transition = 'width 1.2s cubic-bezier(0.4,0,0.2,1)';
                    el.style.width = el.dataset.pct + '%';
                });
            }, 250);

            // ── Build heatmap from activity
            buildHeatmap(user.uid);

            // ── Populate edit modal with current values
            window._profileData = { name, subjects: subjects.join(', '), bio, studyTarget };
        }

        // ══════════════════════════════════════════════════════
        // HEATMAP — built from real activity docs
        // ══════════════════════════════════════════════════════
        async function buildHeatmap(uid) {
            const grid = document.getElementById('heatmapGrid');
            if (!grid) return;

            // Build a map of date → count from activity collection
            const dayMap = {};
            try {
                const q = query(
                    collection(db, 'activity'),
                    where('uid', '==', uid),
                    orderBy('createdAt', 'desc'),
                    limit(500)
                );
                const snap = await getDocs(q);
                snap.docs.forEach(d => {
                    const ts = d.data().createdAt;
                    if (!ts?.toDate) return;
                    const key = ts.toDate().toISOString().slice(0, 10);
                    dayMap[key] = (dayMap[key] || 0) + 1;
                });
            } catch(e) {}

            // Generate 53 weeks × 7 days = 371 cells
            const totalActivity = Object.values(dayMap).reduce((a,b)=>a+b,0);
            const totalEl = document.getElementById('heatmapTotal');
            if (totalEl) totalEl.textContent = totalActivity + ' activities this year';

            const now = new Date();
            // Rewind to start of the week 52 weeks ago
            const start = new Date(now);
            start.setDate(start.getDate() - 52 * 7 - start.getDay());

            let totalSessions = 0;
            for (let w = 0; w < 53; w++) {
                for (let d = 0; d < 7; d++) {
                    const cell = document.createElement('div');
                    const date = new Date(start);
                    date.setDate(start.getDate() + w * 7 + d);
                    const key = date.toISOString().slice(0, 10);
                    const count = dayMap[key] || 0;
                    totalSessions += count;

                    let cls = 'hmap-cell';
                    if      (count >= 5) cls += ' l4';
                    else if (count >= 3) cls += ' l3';
                    else if (count >= 2) cls += ' l2';
                    else if (count >= 1) cls += ' l1';

                    cell.className = cls;
                    cell.title = `${key}: ${count} session${count !== 1 ? 's' : ''}`;
                    grid.appendChild(cell);
                }
            }

            // Month labels
            const monthsEl = document.getElementById('heatmapMonths');
            if (monthsEl) {
                const months = [];
                for (let i = 11; i >= 0; i--) {
                    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                    months.push(d.toLocaleString('default', { month: 'short' }));
                }
                monthsEl.innerHTML = months.map(m => `<span>${m}</span>`).join('');
            }
        }

        // ══════════════════════════════════════════════════════
        // EDIT MODAL
        // ══════════════════════════════════════════════════════
        function openEditModal() {
            const d = window._profileData || {};
            document.getElementById('editName').value     = d.name || '';
            document.getElementById('editSubjects').value = d.subjects || '';
            document.getElementById('editBio').value      = d.bio || '';
            document.getElementById('editGoalHours').value = d.studyTarget || 10;
            document.getElementById('editModal').classList.add('open');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('open');
        }

        async function saveProfile() {
            if (!CU) return;
            const name     = document.getElementById('editName').value.trim();
            const subjects = document.getElementById('editSubjects').value.split(',').map(s=>s.trim()).filter(Boolean);
            const bio      = document.getElementById('editBio').value.trim();
            const goalHours = parseInt(document.getElementById('editGoalHours').value) || 10;

            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true; btn.textContent = 'Saving…';

            try {
                await updateDoc(doc(db, 'users', CU.uid), {
                    displayName: name || CU.displayName || 'Scholar',
                    subjects,
                    bio,
                    'goals.studyHoursTarget': goalHours
                });
                closeEditModal();
            } catch(e) {
                alert('Save failed: ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Save Changes →';
            }
        }

        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', e => {
            if (e.target === document.getElementById('editModal')) closeEditModal();
        });
    </script>

    <!-- Profile nav widget -->
    <script>
        fetch('profile.html')
            .then(r => r.text())
            .then(html => {
                // Only inject the nav widget, not the full page
                const tmp = document.createElement('div');
                tmp.innerHTML = html;
                const widget = tmp.querySelector('#profile-btn-widget');
                if (widget) document.getElementById('profile-container').appendChild(widget);
            })
            .catch(() => {});

        fetch('profile.html')
            .then(r => r.text())
            .then(html => {
                document.getElementById('profile-container').innerHTML = html;
                const lb = document.getElementById('logout-btn');
                if (lb) {
                    lb.addEventListener('click', e => {
                        e.preventDefault();
                        import("https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js")
                            .then(({ getAuth, signOut }) => signOut(getAuth()).then(() => window.location.href = 'login.html'));
                    });
                }
                const pb = document.getElementById('profile-btn');
                const pm = document.getElementById('profile-menu');
                if (pb && pm) {
                    pb.addEventListener('click', () => {
                        pm.style.display = pm.style.display === 'block' ? 'none' : 'block';
                    });
                    document.addEventListener('click', e => {
                        if (!pb.contains(e.target) && !pm.contains(e.target))
                            pm.style.display = 'none';
                    });
                }
            })
            .catch(e => console.error('Profile nav load failed:', e));
    </script>
